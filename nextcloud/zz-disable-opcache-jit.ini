; OPcache JIT is unstable on ARM64 (e.g. Raspberry Pi 5) and segfaults php-fpm
; children during app install/upgrade. The crash is an upstream PHP bug in the
; aarch64 tracing-JIT backend (php/php-src#16829), not a Nextcloud bug, so it
; persists across Nextcloud versions. See nextcloud/docker#2576.
;
; This file must sort after opcache-recommended.ini (loaded alphabetically from
; conf.d, later values win) — hence the zz- prefix.
opcache.jit=0
opcache.jit_buffer_size=0
